<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Innova Talent</title>
<link rel="icon" type="image/png" href="/assets/innova-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0f1117;--bg2:#16181f;--bg3:#1c1f27;--ink:#f0f1f3;--dim:#9ca3af;--mute:#6b7280;--line:#2a2d37;--accent:#6366f1;--accent2:#818cf8;--accent-soft:rgba(99,102,241,.12);--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);font-family:'Geist',system-ui,sans-serif;height:100%;overflow:hidden}
  .font-mono{font-family:'Geist Mono',monospace}

  /* Layout */
  .layout{display:flex;height:100vh}
  .sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .main{flex:1;overflow-y:auto;padding:24px 28px}

  /* Sidebar */
  .sidebar .logo{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .sidebar .logo img{height:26px}
  .sidebar .logo span{font-weight:600;font-size:14px}
  .nav-group{padding:8px 0}
  .nav-group-label{padding:4px 18px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--mute)}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 18px;font-size:13px;color:var(--dim);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover{color:var(--ink);background:var(--accent-soft)}
  .nav-item.active{color:var(--accent2);background:var(--accent-soft)}
  .nav-item .badge-count{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}

  /* Cards */
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:16px}
  .kpi{text-align:center}
  .kpi-value{font-size:28px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .kpi-label{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .kpi-delta{font-size:11px;margin-top:4px}
  .kpi-delta.up{color:var(--green)}
  .kpi-delta.down{color:var(--red)}

  /* Table */
  .tbl{width:100%;border-collapse:separate;border-spacing:0}
  .tbl th{text-align:left;padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--mute);border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg2);z-index:1}
  .tbl td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(42,45,55,.5)}
  .tbl tr:hover td{background:var(--accent-soft)}
  .tbl-wrap{max-height:500px;overflow:auto;border:1px solid var(--line);border-radius:10px}

  /* Badge */
  .badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.02em}
  .b-new{background:rgba(99,102,241,.15);color:var(--accent2)}
  .b-contacted{background:rgba(234,179,8,.12);color:var(--yellow)}
  .b-qualified{background:rgba(34,197,94,.12);color:var(--green)}
  .b-proposal{background:rgba(249,115,22,.12);color:var(--orange)}
  .b-won{background:rgba(34,197,94,.2);color:var(--green)}
  .b-lost{background:rgba(239,68,68,.12);color:var(--red)}
  .b-email{background:rgba(99,102,241,.12);color:var(--accent2)}
  .b-whatsapp{background:rgba(34,197,94,.12);color:var(--green)}
  .b-urgent{background:rgba(239,68,68,.15);color:var(--red)}
  .b-high{background:rgba(249,115,22,.12);color:var(--orange)}
  .b-open{background:rgba(99,102,241,.12);color:var(--accent2)}
  .b-draft{background:rgba(107,114,128,.2);color:var(--dim)}
  .b-sent{background:rgba(99,102,241,.12);color:var(--accent2)}
  .b-accepted{background:rgba(34,197,94,.15);color:var(--green)}
  .b-todo{background:rgba(99,102,241,.12);color:var(--accent2)}
  .b-in_progress{background:rgba(234,179,8,.12);color:var(--yellow)}
  .b-done{background:rgba(34,197,94,.12);color:var(--green)}
  .b-active{background:rgba(34,197,94,.15);color:var(--green)}

  /* Kanban */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:65vh}
  .kanban-col{min-width:210px;max-width:210px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px;flex-shrink:0;display:flex;flex-direction:column}
  .kanban-col-header{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);padding:4px 6px 8px;display:flex;justify-content:space-between;align-items:center}
  .kanban-cards{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .k-card{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;cursor:grab;transition:border-color .12s,transform .12s}
  .k-card:hover{border-color:var(--accent)}
  .k-card.dragging{opacity:.5;transform:scale(.96)}

  /* Inbox */
  .inbox-layout{display:flex;height:calc(100vh - 80px);gap:0}
  .inbox-list{width:320px;border-right:1px solid var(--line);overflow-y:auto;flex-shrink:0}
  .inbox-thread{flex:1;display:flex;flex-direction:column}
  .inbox-item{padding:12px 16px;border-bottom:1px solid rgba(42,45,55,.5);cursor:pointer;transition:background .1s}
  .inbox-item:hover,.inbox-item.active{background:var(--accent-soft)}
  .inbox-item.unread{border-left:3px solid var(--accent)}
  .thread-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
  .thread-msg{max-width:75%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
  .thread-msg.inbound{background:var(--bg3);align-self:flex-start;border-bottom-left-radius:4px}
  .thread-msg.outbound{background:var(--accent-soft);color:var(--ink);align-self:flex-end;border-bottom-right-radius:4px}
  .thread-compose{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px}
  .thread-compose input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 14px;color:var(--ink);font-size:13px;outline:none}
  .thread-compose input:focus{border-color:var(--accent)}
  .thread-compose button{background:var(--accent);border:none;border-radius:8px;padding:10px 18px;color:#fff;cursor:pointer;font-weight:600;font-size:13px}

  /* Buttons */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--line);background:var(--bg2);color:var(--ink);transition:all .12s}
  .btn:hover{border-color:var(--accent);background:var(--accent-soft)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent2)}

  /* Form */
  .input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:8px 12px;color:var(--ink);font-size:13px;outline:none;font-family:inherit}
  .input:focus{border-color:var(--accent)}
  .label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--dim);margin-bottom:4px}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center}
  .modal{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:24px;width:min(560px,92vw);max-height:85vh;overflow-y:auto}
  .modal h3{font-size:18px;font-weight:600;margin-bottom:16px}

  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}

  /* Chart container */
  .chart-wrap{position:relative;height:220px}

  /* Tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .tab{padding:8px 14px;font-size:13px;color:var(--dim);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .12s}
  .tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
  .tab:hover{color:var(--ink)}

  /* AI Assistant */
  .ai-fab{position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:transform .15s}
  .ai-fab:hover{transform:scale(1.08)}
  .ai-panel{position:fixed;bottom:80px;right:20px;width:380px;height:520px;background:var(--bg2);border:1px solid var(--line);border-radius:14px;z-index:90;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .ai-panel-header{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .ai-panel-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .ai-panel-msg{max-width:85%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;white-space:pre-wrap}
  .ai-panel-msg.user{background:var(--accent-soft);align-self:flex-end;border-bottom-right-radius:4px}
  .ai-panel-msg.assistant{background:var(--bg3);align-self:flex-start;border-bottom-left-radius:4px}
  .ai-panel-input{padding:10px;border-top:1px solid var(--line);display:flex;gap:6px}
  .ai-panel-input input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;color:var(--ink);font-size:13px;outline:none}
  .ai-panel-input input:focus{border-color:var(--accent)}
  .ai-panel-input button{background:var(--accent);border:none;border-radius:8px;padding:8px 14px;color:#fff;cursor:pointer;font-weight:600;font-size:12px}
  .ai-panel-actions{padding:6px 10px;border-top:1px solid var(--line);display:flex;gap:4px;flex-wrap:wrap}
  .ai-quick-btn{font-size:10px;padding:4px 8px;border-radius:5px;border:1px solid var(--line);background:var(--bg);color:var(--dim);cursor:pointer;transition:all .1s}
  .ai-quick-btn:hover{border-color:var(--accent);color:var(--accent2)}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="/assets/innova-logo.png" alt="" />
      <span>Innova Talent</span>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Principal</div>
      <button class="nav-item active" data-tab="dashboard">📊 Dashboard</button>
      <button class="nav-item" data-tab="inbox">💬 Inbox <span class="badge-count" id="unreadBadge" style="display:none">0</span></button>
      <button class="nav-item" data-tab="pipeline">🔄 Pipeline</button>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">CRM</div>
      <button class="nav-item" data-tab="clients">👥 Leads</button>
      <button class="nav-item" data-tab="candidates">💼 Candidatos</button>
      <button class="nav-item" data-tab="proposals">📄 Propuestas</button>
      <button class="nav-item" data-tab="meetings">📅 Reuniones</button>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Automatización</div>
      <button class="nav-item" data-tab="workflows">⚡ Workflows</button>
      <button class="nav-item" data-tab="sequences">📨 Secuencias</button>
      <button class="nav-item" data-tab="forms">📝 Forms</button>
    </div>

    <div class="nav-group">
      <div class="nav-group-label">Inteligencia</div>
      <button class="nav-item" data-tab="ai">🤖 IA Chats</button>
      <button class="nav-item" data-tab="analytics">📈 Analytics</button>
      <button class="nav-item" data-tab="tasks">✅ Tareas</button>
    </div>

    <div style="margin-top:auto;padding:12px 18px;border-top:1px solid var(--line)">
      <div class="text-xs" style="color:var(--mute)" id="adminEmail"></div>
      <button class="nav-item" style="padding:6px 0;font-size:12px" onclick="logout()">↩ Cerrar sesión</button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main" id="main"></main>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('accessToken');
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (!token || user.role !== 'admin') window.location.href = '/auth/login.html';
document.getElementById('adminEmail').textContent = user.email;

async function api(path, opts = {}) {
  const headers = { 'Authorization': `Bearer ${token}`, ...opts.headers };
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  const res = await fetch(`${API}${path}`, { ...opts, headers });
  if (res.status === 401) {
    const r = await fetch(`${API}/auth/refresh`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({refreshToken:localStorage.getItem('refreshToken')}) });
    if (r.ok) { const d = await r.json(); token = d.accessToken; localStorage.setItem('accessToken',d.accessToken); localStorage.setItem('refreshToken',d.refreshToken); return api(path,opts); }
    return logout();
  }
  return res.json();
}

function logout() { fetch(`${API}/auth/logout`,{method:'POST',headers:{'Authorization':`Bearer ${token}`}}).finally(()=>{localStorage.clear();window.location.href='/auth/login.html';}); }

function $(sel, ctx=document){return ctx.querySelector(sel)}
function $$(sel,ctx=document){return [...ctx.querySelectorAll(sel)]}
function h(tag,attrs={},...children){const el=document.createElement(tag);for(const[k,v]of Object.entries(attrs)){if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else el.setAttribute(k,v)}for(const c of children){if(typeof c==='string')el.appendChild(document.createTextNode(c));else if(c)el.appendChild(c)}return el}

// Tab navigation
let currentTab = 'dashboard';
$$('.nav-item[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    render(currentTab);
  });
});

// ==== RENDER FUNCTIONS ====

async function render(tab) {
  const main = $('#main');
  main.innerHTML = '<div style="text-align:center;padding:80px;color:var(--mute)">Cargando...</div>';
  try {
    switch(tab) {
      case 'dashboard': return renderDashboard();
      case 'inbox': return renderInbox();
      case 'pipeline': return renderPipeline();
      case 'clients': return renderClients();
      case 'candidates': return renderCandidates();
      case 'proposals': return renderProposals();
      case 'meetings': return renderMeetings();
      case 'workflows': return renderWorkflows();
      case 'sequences': return renderSequences();
      case 'forms': return renderForms();
      case 'ai': return renderAI();
      case 'analytics': return renderAnalytics();
      case 'tasks': return renderTasks();
    }
  } catch(e) { main.innerHTML = `<div style="color:var(--red);padding:40px">Error: ${e.message}</div>`; }
}

// ==== DASHBOARD ====

async function renderDashboard() {
  const kpis = await api('/analytics/kpis');
  const main = $('#main');
  main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1 style="font-size:22px;font-weight:600">Dashboard</h1>
      <div style="display:flex;gap:8px">
        <a href="${API}/admin/export/clients" target="_blank" class="btn">📥 Leads CSV</a>
        <a href="${API}/admin/export/candidates" target="_blank" class="btn">📥 Candidatos CSV</a>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px">
      <div class="card kpi"><div class="kpi-value" style="color:var(--accent)">${kpis.total_leads}</div><div class="kpi-label">Total leads</div><div class="kpi-delta up">+${kpis.leads_7d} esta semana</div></div>
      <div class="card kpi"><div class="kpi-value">${kpis.total_candidates}</div><div class="kpi-label">Candidatos</div></div>
      <div class="card kpi"><div class="kpi-value" style="color:var(--green)">${kpis.active_subs}</div><div class="kpi-label">Suscripciones</div></div>
      <div class="card kpi"><div class="kpi-value" style="color:var(--green)">$${kpis.total_revenue.toLocaleString()}</div><div class="kpi-label">Revenue total</div><div class="kpi-delta up">$${kpis.revenue_30d} este mes</div></div>
      <div class="card kpi"><div class="kpi-value">${kpis.upcoming_meetings}</div><div class="kpi-label">Reuniones prox</div></div>
      <div class="card kpi"><div class="kpi-value" style="color:${kpis.open_conversations > 0 ? 'var(--yellow)' : 'var(--dim)'}">${kpis.open_conversations}</div><div class="kpi-label">Conv. abiertas</div>${kpis.unread_messages > 0 ? `<div class="kpi-delta down">${kpis.unread_messages} sin leer</div>` : ''}</div>
      <div class="card kpi"><div class="kpi-value">${kpis.pending_tasks}</div><div class="kpi-label">Tareas pend.</div></div>
      <div class="card kpi"><div class="kpi-value">${kpis.win_rate || 0}%</div><div class="kpi-label">Win rate</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--dim)">Leads últimos 30 días</div><div class="chart-wrap"><canvas id="chartLeads"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--dim)">Revenue mensual</div><div class="chart-wrap"><canvas id="chartRevenue"></canvas></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--dim)">Pipeline</div><div class="chart-wrap"><canvas id="chartPipeline"></canvas></div></div>
      <div class="card"><div style="font-size:13px;font-weight:500;margin-bottom:12px;color:var(--dim)">Servicios solicitados</div><div class="chart-wrap"><canvas id="chartServices"></canvas></div></div>
    </div>
  `;

  const analytics = await api('/analytics/dashboard');
  const colors = {new:'#6366f1',contacted:'#eab308',qualified:'#22c55e',proposal:'#f97316',negotiation:'#3b82f6',won:'#10b981',lost:'#ef4444'};
  const svcColors = {recruitment:'#6366f1',automation:'#f97316',data:'#22c55e',web_dev:'#3b82f6',ai:'#a855f7'};
  const svcLabels = {recruitment:'Reclutamiento',automation:'Automatización',data:'Data/BI',web_dev:'Desarrollo Web',ai:'IA'};

  const chartCfg = {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(42,45,55,.5)'},ticks:{color:'#6b7280',font:{size:10}}},y:{grid:{color:'rgba(42,45,55,.5)'},ticks:{color:'#6b7280',font:{size:10}}}}};

  new Chart($('#chartLeads'),{type:'bar',data:{labels:analytics.leads_over_time.map(d=>d.date.slice(5)),datasets:[{data:analytics.leads_over_time.map(d=>d.count),backgroundColor:'rgba(99,102,241,.6)',borderRadius:4}]},options:chartCfg});

  new Chart($('#chartRevenue'),{type:'line',data:{labels:analytics.revenue.map(d=>d.month),datasets:[{data:analytics.revenue.map(d=>d.revenue/100),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,.1)',fill:true,tension:.3,pointRadius:3}]},options:chartCfg});

  new Chart($('#chartPipeline'),{type:'doughnut',data:{labels:analytics.pipeline.map(p=>p.status),datasets:[{data:analytics.pipeline.map(p=>p.count),backgroundColor:analytics.pipeline.map(p=>colors[p.status]||'#6b7280')}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#9ca3af',font:{size:11}}}}}});

  new Chart($('#chartServices'),{type:'bar',data:{labels:analytics.top_services.map(s=>svcLabels[s.service]||s.service),datasets:[{data:analytics.top_services.map(s=>s.count),backgroundColor:analytics.top_services.map(s=>svcColors[s.service]||'#6366f1'),borderRadius:4}]},options:{...chartCfg,indexAxis:'y'}});
}

// ==== INBOX (Unified Conversations) ====

let activeConvId = null;
async function renderInbox() {
  const data = await api('/conversations?status=all');
  const main = $('#main');
  main.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1 style="font-size:22px;font-weight:600">Inbox</h1>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary" onclick="showNewConversation()">+ Nueva</button>
        <button class="btn tab-filter active" data-f="all">Todas</button>
        <button class="btn tab-filter" data-f="open">Abiertas</button>
        <button class="btn tab-filter" data-f="closed">Cerradas</button>
      </div>
    </div>
    <div class="inbox-layout" style="border:1px solid var(--line);border-radius:10px;overflow:hidden">
      <div class="inbox-list" id="inboxList">
        ${data.data.length ? data.data.map(c => inboxItemHtml(c)).join('') : '<div style="padding:40px;text-align:center;color:var(--mute)">Sin conversaciones</div>'}
      </div>
      <div class="inbox-thread" id="inboxThread">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--mute)">Seleccioná una conversación</div>
      </div>
    </div>
  `;

    $$('.tab-filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');

    $('#inboxList').innerHTML = d.data.map(c=>inboxItemHtml(c)).join('') || '<div style="padding:40px;text-align:center;color:var(--mute)">Sin conversaciones</div>';
    bindInboxItems();
  }));
  bindInboxItems();
}

function inboxItemHtml(c) {
  return `<div class="inbox-item ${c.unread_count > 0 ? 'unread' : ''}" data-id="${c.id}">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:500;font-size:13px">${c.contact_name || c.company_name || 'Sin nombre'}</span>
      <span style="font-size:10px;color:var(--mute)">${timeAgo(c.last_message_at)}</span>
    </div>
    <div style="font-size:11px;color:var(--mute);margin-top:2px">${c.contact_email || ''}</div>
    <div style="font-size:12px;color:var(--dim);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.last_message || ''}</div>
    <div style="display:flex;gap:4px;margin-top:4px">
      <span class="badge b-${c.channel}">${c.channel}</span>
      <span class="badge b-${c.status}">${c.status}</span>
    </div>
  </div>`;
}

function bindInboxItems() {
  $$('.inbox-item').forEach(el => el.addEventListener('click', () => openConversation(el.dataset.id)));
}

async function openConversation(id) {
  activeConvId = id;
  $$('.inbox-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const conv = await api(`/conversations/${id}`);
  const thread = $('#inboxThread');
  thread.innerHTML = `
    <div style="padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:500;font-size:14px">${conv.contact_name || conv.company_name}</div>
        <div style="font-size:11px;color:var(--mute)">${conv.contact_email} · ${conv.channel} · <span class="badge b-${conv.pipeline_status || 'new'}">${conv.pipeline_status || 'new'}</span></div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn" onclick="api('/conversations/${id}',{method:'PATCH',body:JSON.stringify({status:'closed'})}).then(()=>renderInbox())">Cerrar</button>
      </div>
    </div>
    <div class="thread-messages" id="threadMsgs">
      ${conv.messages.map(m => `<div class="thread-msg ${m.direction}">
        <div style="font-size:10px;color:var(--mute);margin-bottom:4px">${m.sender_name || m.sender_type} · ${new Date(m.created_at).toLocaleString()}</div>
        ${m.body}
      </div>`).join('')}
    </div>
    <div class="thread-compose">
      <input id="msgInput" placeholder="Escribir mensaje..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button onclick="sendMsg()">Enviar</button>
    </div>
  `;
  const msgs = $('#threadMsgs'); msgs.scrollTop = msgs.scrollHeight;
}

async function sendMsg() {
  const input = $('#msgInput'); const body = input.value.trim(); if (!body) return;
  input.value = '';
  await api(`/conversations/${activeConvId}/messages`, {method:'POST', body: JSON.stringify({body})});
  openConversation(activeConvId);
}

function removeProposalItem(i) { proposalItems.splice(i,1); renderProposalItems(); }

function renderProposalItems() {
  const area = $('#propItemsArea');
  if (!area) return;
  area.innerHTML = proposalItems.map((item,i) => `
    <div style="display:grid;grid-template-columns:2fr 80px 100px 40px;gap:6px;align-items:center;margin-bottom:6px">
      <input class="input" placeholder="Descripción" value="${item.description}" onchange="proposalItems[${i}].description=this.value">

      <input class="input" type="number" min="0" step="0.01" placeholder="Precio" value="${item.unit_price/100||''}" onchange="proposalItems[${i}].unit_price=Math.round(this.value*100);updatePropTotal()">
      <button class="btn" style="padding:4px 8px;color:var(--red)" onclick="removeProposalItem(${i})">✕</button>
    </div>
  `).join('');
  updatePropTotal();
}

function updatePropTotal() {
  const total = proposalItems.reduce((s,i)=>s+(i.quantity*(i.unit_price||0)),0);
  const el = $('#propTotal');
  if (el) el.textContent = `Total: $${(total/100).toFixed(2)}`;
}

async function saveProposal(mode) {
  const title = $('#propTitle')?.value?.trim();
  const client_id = $('#propClient')?.value?.trim() || null;
  const notes = $('#propNotes')?.value?.trim() || null;
  if (!title) return alert('Ingresa un título');
  if (!proposalItems.some(i=>i.description)) return alert('Agrega al menos una línea con descripción');
  const items = proposalItems.filter(i=>i.description);
  const res = await api('/proposals', {method:'POST', body:JSON.stringify({title, client_id, notes, items})});
  if (mode === 'send' && res.id) await api(`/proposals/${res.id}/send`, {method:'POST'});
  document.querySelector('.modal-overlay')?.remove();
  renderProposals();
}

async function toggleWorkflow(id, active) { await api(`/workflows/${id}`,{method:'PATCH',body:JSON.stringify({active})}); renderWorkflows(); }
async function deleteWorkflow(id) { if(!confirm('¿Eliminar este workflow?')) return; await api(`/workflows/${id}`,{method:'DELETE'}); renderWorkflows(); }

let wfSteps = [];
function showWorkflowBuilder() {
  const triggers = ['lead_created','status_changed','form_submitted','manual'];
  const stepTypes = [{v:'send_email',l:'Enviar Email'},{v:'send_whatsapp',l:'Enviar WhatsApp'},{v:'wait',l:'Esperar (días)'},{v:'update_status',l:'Cambiar Estado'},{v:'webhook',l:'Webhook'}];
  wfSteps = [];

  const overlay = h('div',{class:'modal-overlay',onClick:e=>{if(e.target===overlay)overlay.remove()}});
  const modal = h('div',{class:'modal',style:{width:'min(640px,92vw)'}});
  modal.innerHTML = `
    <h3>Nuevo Workflow</h3>
    <div style="display:grid;gap:12px">
      <div><label class="label">Nombre</label><input class="input" id="wfName" placeholder="Ej: Onboarding de lead"></div>
      <div><label class="label">Trigger</label><select class="input" id="wfTrigger">${triggers.map(t=>`<option value="${t}">${t.replace(/_/g,' ')}</option>`).join('')}</select></div>
      <div>
        <label class="label">Pasos del workflow</label>
        <div id="wfStepsArea" style="min-height:60px;border:1px dashed var(--line);border-radius:8px;padding:12px;margin-bottom:8px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${stepTypes.map(s=>`<button class="btn" onclick="addWfStep('${s.v}')">${s.l}</button>`).join('')}
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
        <button class="btn" onclick="this.closest('.modal-overlay').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveWorkflow()">Crear workflow</button>
      </div>
    </div>`;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function addWfStep(type) {
  const step = {type, config:{}};
  wfSteps.push(step);
  renderWfSteps();
}

function removeWfStep(i) { wfSteps.splice(i,1); renderWfSteps(); }

function renderWfSteps() {
  const area = $('#wfStepsArea');
  if (!area) return;
  if (!wfSteps.length) { area.innerHTML = '<div style="text-align:center;color:var(--mute);font-size:12px;padding:16px">Agrega pasos usando los botones</div>'; return; }
  area.innerHTML = wfSteps.map((s,i) => {
    const icon = s.type==='send_email'?'✉️':s.type==='send_whatsapp'?'📱':s.type==='wait'?'⏳':s.type==='update_status'?'🔄':'🔗';
    let configHtml = '';
    if (s.type === 'send_email') configHtml = `<input class="input" style="margin-top:6px" placeholder="Asunto del email" onchange="wfSteps[${i}].config.subject=this.value"><input class="input" style="margin-top:4px" placeholder="Cuerpo (usa {{name}}, {{company}})" onchange="wfSteps[${i}].config.body=this.value">`;
    else if (s.type === 'send_whatsapp') configHtml = `<input class="input" style="margin-top:6px" placeholder="Mensaje WhatsApp" onchange="wfSteps[${i}].config.message=this.value">`;
    else if (s.type === 'wait') configHtml = `<input class="input" style="margin-top:6px;width:80px" type="number" placeholder="Días" min="1" value="1" onchange="wfSteps[${i}].config.days=+this.value">`;
    else if (s.type === 'update_status') configHtml = `<select class="input" style="margin-top:6px" onchange="wfSteps[${i}].config.status=this.value"><option value="contacted">Contactado</option><option value="qualified">Calificado</option><option value="proposal">Propuesta</option><option value="negotiation">Negociación</option><option value="won">Ganado</option></select>`;
    else if (s.type === 'webhook') configHtml = `<input class="input" style="margin-top:6px" placeholder="URL del webhook" onchange="wfSteps[${i}].config.url=this.value">`;
    return `<div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:500">${icon} Paso ${i+1}: ${s.type.replace(/_/g,' ')}</span>
        <button class="btn" style="font-size:10px;padding:2px 6px;color:var(--red)" onclick="removeWfStep(${i})">✕</button>
      </div>
      ${configHtml}
      ${i < wfSteps.length - 1 ? '<div style="text-align:center;color:var(--mute);margin-top:6px">↓</div>' : ''}
    </div>`;
  }).join('');
}

async function saveWorkflow() {
  const name = $('#wfName')?.value?.trim();
  const trigger = $('#wfTrigger')?.value;
  if (!name) return alert('Ingresa un nombre');
  if (!wfSteps.length) return alert('Agrega al menos un paso');
  await api('/workflows', {method:'POST', body:JSON.stringify({name, trigger, steps:wfSteps, active:true})});
  document.querySelector('.modal-overlay')?.remove();
  renderWorkflows();
}

function addFormField(type, label) {
  formFields.push({type, label:'', name:'', required:true, options:type==='select'?[]:undefined});

}

function removeFormField(i) { formFields.splice(i,1); renderFormFields(); }

function renderFormFields() {
  const area = $('#formFieldsArea');
  if (!area) return;
  if (!formFields.length) { area.innerHTML = '<div style="text-align:center;color:var(--mute);font-size:12px;padding:16px">Agrega campos usando los botones</div>'; return; }
  area.innerHTML = formFields.map((f,i) => {
    const typeIcons = {text:'Aa',email:'@',tel:'📞',number:'#',textarea:'¶',select:'▾',checkbox:'☑'};
    return `<div style="background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:6px">
      <div style="display:flex;gap:8px;align-items:center">

        <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer"><input type="checkbox" ${f.required?'checked':''} onchange="formFields[${i}].required=this.checked"> Req.</label>

      </div>

  }).join('');
}

async function saveForm() {
  const name = $('#formName')?.value?.trim();
  const slug = $('#formSlug')?.value?.trim();
  const webhook_url = $('#formWebhook')?.value?.trim() || null;
  if (!name || !slug) return alert('Nombre y slug son requeridos');
  if (!formFields.length) return alert('Agrega al menos un campo');
  const fields = formFields.map(f => ({...f, label: f.label || f.type, name: f.name || f.type}));
  await api('/forms', {method:'POST', body:JSON.stringify({name, slug, fields, webhook_url, active:true})});
  document.querySelector('.modal-overlay')?.remove();
  renderForms();
}

// ==== CLIENT PICKER ====
async function initClientPicker(inputId) {
  const input = $(`#${inputId}`);
  if (!input) return;
  const wrapper = input.parentElement;
  wrapper.style.position = 'relative';
  const dropdown = h('div',{style:{position:'absolute',top:'100%',left:'0',right:'0',background:'var(--bg2)',border:'1px solid var(--line)',borderRadius:'8px',maxHeight:'180px',overflowY:'auto',zIndex:'10',display:'none'}});
  wrapper.appendChild(dropdown);

  let timeout;
  input.addEventListener('input', () => {
    clearTimeout(timeout);
    timeout = setTimeout(async () => {
      const q = input.value.trim();
      if (q.length < 2) { dropdown.style.display = 'none'; return; }
      const data = await api(`/clients?search=${encodeURIComponent(q)}&limit=8`);
      if (!data.data?.length) { dropdown.style.display = 'none'; return; }
      dropdown.innerHTML = data.data.map(c => `<div style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--line)" onmousedown="document.getElementById('${inputId}').value='${c.id}';this.parentElement.style.display='none'"><strong>${c.company_name}</strong> <span style="color:var(--mute)">— ${c.contact_name} (${c.email})</span></div>`).join('');
      dropdown.style.display = 'block';
    }, 300);
  });
  input.addEventListener('blur', () => setTimeout(() => dropdown.style.display = 'none', 200));
}

// ==== HELPERS ====
function timeAgo(date) {
  const diff = (Date.now() - new Date(date).getTime()) / 1000;
  if (diff < 60) return 'ahora';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  return `${Math.floor(diff/86400)}d`;
}

// ==== AI ASSISTANT ====
let aiOpen = false;
let aiMessages = [];
let aiConvId = null;
let aiLoading = false;

function toggleAI() {
  aiOpen = !aiOpen;
  if (aiOpen) {
    if (!aiMessages.length) aiMessages.push({role:'assistant',content:'Hola! Soy tu asistente de negocios. Puedo ayudarte a:\n\n• Analizar leads y sugerir estrategias\n• Redactar emails y propuestas\n• Interpretar métricas del dashboard\n• Priorizar tareas\n\n¿En qué te ayudo?'});
    renderAIPanel();
  } else {
    const panel = document.getElementById('aiPanel');
    if (panel) panel.remove();
  }
}

function renderAIPanel() {
  let panel = document.getElementById('aiPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'aiPanel';
    panel.className = 'ai-panel';
    document.body.appendChild(panel);
  }
  panel.innerHTML = `
    <div class="ai-panel-header">
      <div><span style="font-weight:600;font-size:13px">Asistente IA</span> <span style="font-size:11px;color:var(--accent2)">· Gemini</span></div>
      <div style="display:flex;gap:6px">
        <button class="ai-quick-btn" onclick="aiMessages=[];aiConvId=null;toggleAI();toggleAI()">Limpiar</button>
        <button style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px" onclick="toggleAI()">✕</button>
      </div>
    </div>
    <div class="ai-panel-msgs" id="aiMsgs">
      ${aiMessages.map(m => `<div class="ai-panel-msg ${m.role}">${m.content}</div>`).join('')}
      ${aiLoading ? '<div class="ai-panel-msg assistant" style="opacity:.5">Pensando...</div>' : ''}
    </div>
    <div class="ai-panel-actions">
      <button class="ai-quick-btn" onclick="aiQuick('draft_email',{})">✉️ Email</button>
      <button class="ai-quick-btn" onclick="aiQuick('draft_whatsapp',{})">📱 WhatsApp</button>
      <button class="ai-quick-btn" onclick="aiQuick('analyze_pipeline',{})">📊 Pipeline</button>
      <button class="ai-quick-btn" onclick="aiQuick('suggest_tasks',{})">✅ Tareas</button>
    </div>
    <div class="ai-panel-input">
      <input id="aiInput" placeholder="Preguntá algo..." onkeydown="if(event.key==='Enter')sendAI()" ${aiLoading?'disabled':''} />
      <button onclick="sendAI()" ${aiLoading?'disabled':''}>Enviar</button>
    </div>
  `;
  const msgs = document.getElementById('aiMsgs');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  const input = document.getElementById('aiInput');
  if (input && !aiLoading) input.focus();
}

async function sendAI() {
  const input = document.getElementById('aiInput');
  const msg = input?.value?.trim();
  if (!msg || aiLoading) return;
  input.value = '';
  aiMessages.push({role:'user', content:msg});
  aiLoading = true;
  renderAIPanel();
  try {
    const data = await api('/ai/assistant', {method:'POST', body:JSON.stringify({message:msg, conversation_id:aiConvId})});
    if (data.conversation_id) aiConvId = data.conversation_id;
    aiMessages.push({role:'assistant', content:data.response});
  } catch (e) {
    aiMessages.push({role:'assistant', content:'Error: ' + (e.message || 'no se pudo conectar')});
  }
  aiLoading = false;
  renderAIPanel();
}

async function aiQuick(action, extraData) {
  aiLoading = true;
  let context = extraData;
  if (action === 'analyze_pipeline') {
    try { context = await api('/analytics/kpis'); } catch {}
  }
  const promptMap = {
    draft_email: 'Redactame un email de seguimiento profesional para un lead. Preguntame los datos que necesitás.',
    draft_whatsapp: 'Redactame un mensaje de WhatsApp corto para un lead. Preguntame los datos.',
    analyze_pipeline: `Analizá estos KPIs de mi pipeline y dame 3 recomendaciones:\n${JSON.stringify(context)}`,
    suggest_tasks: 'Sugerí 5 tareas prioritarias que debería hacer hoy para avanzar con mis leads y pipeline.'
  };
  const msg = promptMap[action] || action;
  aiMessages.push({role:'user', content:msg});
  renderAIPanel();
  try {
    const data = await api('/ai/assistant', {method:'POST', body:JSON.stringify({message:msg, conversation_id:aiConvId})});
    if (data.conversation_id) aiConvId = data.conversation_id;
    aiMessages.push({role:'assistant', content:data.response});
  } catch (e) {
    aiMessages.push({role:'assistant', content:'Error: ' + (e.message || 'IA no disponible')});
  }
  aiLoading = false;
  renderAIPanel();
}
