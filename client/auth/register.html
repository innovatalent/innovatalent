<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Registro — Innova Talent</title>
<link rel="icon" type="image/png" href="/assets/innova-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --bg: oklch(0.12 0.008 250); --bg-2: oklch(0.16 0.012 250); --ink: oklch(0.98 0.005 250); --ink-dim: oklch(0.72 0.01 250); --ink-mute: oklch(0.52 0.012 250); --line: oklch(0.28 0.012 250); --accent: oklch(0.74 0.14 230); --accent-soft: oklch(0.74 0.14 230 / 0.12); }
  html, body { background: var(--bg); color: var(--ink); font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 12px 16px; color: var(--ink); font-size: 14px; outline: none; transition: border-color .2s; }
  .form-input:focus { border-color: var(--accent); }
  .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 22px; border-radius: 12px; background: var(--ink); color: var(--bg); font-weight: 500; font-size: 15px; border: none; cursor: pointer; width: 100%; transition: transform .2s; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .role-btn { padding: 16px; border-radius: 12px; border: 1px solid var(--line); background: var(--bg); cursor: pointer; text-align: center; transition: all .2s; }
  .role-btn.active { border-color: var(--accent); background: var(--accent-soft); }
</style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="/"><img src="/assets/innova-logo.png" alt="Innova Talent" class="h-12 mx-auto mb-4" /></a>
      <h1 class="text-2xl font-semibold">Crear cuenta</h1>
      <p class="text-sm mt-2" style="color:var(--ink-dim)">Elegí tu tipo de cuenta</p>
    </div>

    <div id="error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg p-3 mb-4 text-sm"></div>

    <div class="grid grid-cols-2 gap-3 mb-6">
      <button id="roleStartup" class="role-btn active" onclick="selectRole('startup')">
        <div class="text-2xl mb-1">🏢</div>
        <div class="font-medium text-sm">Startup</div>
        <div class="text-xs mt-1" style="color:var(--ink-mute)">Busco talento</div>
      </button>
      <button id="roleCandidate" class="role-btn" onclick="selectRole('candidate')">
        <div class="text-2xl mb-1">👨‍💻</div>
        <div class="font-medium text-sm">Candidato</div>
        <div class="text-xs mt-1" style="color:var(--ink-mute)">Busco trabajo</div>
      </button>
    </div>

    <form id="registerForm" class="space-y-4">
      <input type="hidden" id="role" value="startup" />
      <div>
        <label class="block text-xs font-medium uppercase tracking-wider mb-1.5" style="color:var(--ink-dim)">Email</label>
        <input id="email" type="email" class="form-input" required placeholder="tu@email.com" />
      </div>
      <div>
        <label class="block text-xs font-medium uppercase tracking-wider mb-1.5" style="color:var(--ink-dim)">Contraseña</label>
        <input id="password" type="password" class="form-input" required minlength="8" placeholder="Mínimo 8 caracteres" />
      </div>
      <div>
        <label class="block text-xs font-medium uppercase tracking-wider mb-1.5" style="color:var(--ink-dim)">Confirmar contraseña</label>
        <input id="password2" type="password" class="form-input" required placeholder="Repetir contraseña" />
      </div>
      <button type="submit" id="submitBtn" class="btn-primary">Crear cuenta</button>
    </form>

    <p class="text-center text-sm mt-6" style="color:var(--ink-mute)">
      ¿Ya tenés cuenta? <a href="/auth/login.html" style="color:var(--accent)">Iniciar sesión</a>
    </p>
    <p class="text-center text-sm mt-2">
      <a href="/" style="color:var(--ink-mute)">← Volver al inicio</a>
    </p>
  </div>
</div>

<script>
function selectRole(role) {
  document.getElementById('role').value = role;
  document.getElementById('roleStartup').className = 'role-btn' + (role === 'startup' ? ' active' : '');
  document.getElementById('roleCandidate').className = 'role-btn' + (role === 'candidate' ? ' active' : '');
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('error');
  const pass = document.getElementById('password').value;
  const pass2 = document.getElementById('password2').value;

  if (pass !== pass2) { errorEl.textContent = 'Las contraseñas no coinciden'; errorEl.classList.remove('hidden'); return; }

  btn.disabled = true; btn.textContent = 'Creando...';
  errorEl.classList.add('hidden');

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: pass,
        role: document.getElementById('role').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('accessToken', data.accessToken);
    localStorage.setItem('refreshToken', data.refreshToken);
    localStorage.setItem('user', JSON.stringify(data.user));

    const dashMap = { admin: '/dashboard/admin.html', startup: '/dashboard/startup.html', candidate: '/dashboard/candidate.html' };
    window.location.href = dashMap[data.user.role] || '/dashboard/startup.html';
  } catch (err) {
    errorEl.textContent = err.message;
    errorEl.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Crear cuenta';
  }
});
</script>
</body>
</html>
