<div style="max-width:800px;margin:0 auto;padding:40px 20px;color:#e0e0e0;font-family:system-ui,sans-serif;">
  <h1>Innova Talent Labs — Agencia de Reclutamiento IT y Automatización para Startups</h1>
  <p>Armamos equipos tech de alto rendimiento para startups en 21 días. Reclutadores embebidos que buscan, evalúan y entregan equipos de ingeniería senior para que los founders dejen de entrevistar y empiecen a shippear.</p>

  <h2>Nuestros Servicios</h2>

  <h3>Reclutamiento IT y Armado de Equipos Tech</h3>
  <p>¿Necesitás armar un equipo de desarrollo para tu startup? Hacemos sourcing profundo en LATAM, EE.UU. y Europa. Llegamos al 70% de los perfiles tech que no están en job boards. Diseñamos la forma del equipo — líderes, seniors, especialistas — para tu roadmap. Perfiles: desarrolladores frontend, backend, mobile, data analysts, ML engineers, DevOps, SRE, CTOs fraccionales.</p>

  <h3>Automatización de Negocios</h3>
  <p>¿Querés automatizar tu negocio? Optimizamos procesos repetitivos con IA y automatización para ahorrar tiempo y reducir errores. WhatsApp automático, CRM, integraciones entre plataformas y reportes automáticos.</p>

  <h3>Landing Pages y Desarrollo Web Profesional</h3>
  <p>¿Necesitás una landing page que convierta? Diseñamos páginas web modernas enfocadas en ventas, confianza y resultados. Landing pages, sitios corporativos, e-commerce y formularios de captación optimizados para SEO.</p>

  <h3>Especialistas en Meta Ads</h3>
  <p>Gestión profesional de campañas en Meta Ads (Facebook Ads e Instagram Ads). Estrategia de segmentación, optimización de conversiones y reportes de rendimiento para startups y pymes en Argentina y Latinoamérica.</p>

  <h3>Ciencia de Datos y Business Intelligence</h3>
  <p>Transformamos datos en decisiones. Dashboards, KPIs y predicciones que mueven tu negocio.</p>

  <h2>¿Por qué elegirnos?</h2>
  <ul>
    <li>Equipos armados en 21 días</li>
    <li>Diagnóstico inicial gratuito</li>
    <li>Garantía de 90 días</li>
    <li>Sin retainers — pagás por resultados</li>
    <li>Presencia en Buenos Aires y servicio remoto global</li>
  </ul>

  <h2>Contacto</h2>
